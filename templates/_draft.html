<article class="draft" data-index="{{ draft.index }}" data-status="{{ draft.status }}">
  <div class="draft-meta">
    <div>
      <h3>{{ draft.company }}</h3>
      <p>{{ draft.role }}</p>
    </div>
    <span class="pill {{ draft.status }}">{{ draft.status.replace("_", " ") }}</span>
  </div>

  <dl class="mail-meta">
    <div>
      <dt>To</dt>
      <dd>{{ draft.to or "No recipient found" }}</dd>
    </div>
    <div>
      <dt>Subject</dt>
      <dd>{{ draft.subject }}</dd>
    </div>
    <div>
      <dt>Attachment</dt>
      <dd>{{ draft.resume_path or "None" }}</dd>
    </div>
  </dl>

  <pre>{{ draft.body }}</pre>

  <div class="draft-actions">
    <a class="source" href="{{ draft.source_url }}" target="_blank" rel="noreferrer">Source</a>
    <button class="ghost" data-action="remove" data-index="{{ draft.index }}">Remove</button>
    <button class="primary" data-action="send" data-index="{{ draft.index }}" {% if not draft.to or draft.status == "sent" %}disabled{% endif %}>
      Send
    </button>
  </div>
</article>
